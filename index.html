<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>刷题练习</title>
  <style>
:root {
  color-scheme: light;
  --bg: #f6f7f9;
  --panel: #ffffff;
  --text: #1b1f24;
  --muted: #68707d;
  --line: #d9dee7;
  --primary: #2367c5;
  --primary-dark: #174f9e;
  --accent: #0b7f6b;
  --danger: #ba3b35;
  --danger-soft: #fff1ef;
  --ok-soft: #edf8f2;
  --warn-soft: #fff6df;
  --shadow: 0 16px 42px rgba(27, 31, 36, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  line-height: 1.6;
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  max-width: 1120px;
  margin: 0 auto;
  padding: 28px 20px 18px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--accent);
  font-size: 14px;
  font-weight: 700;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: 30px;
  line-height: 1.2;
}

h2 {
  margin-bottom: 0;
  font-size: 22px;
}

h3 {
  margin-bottom: 12px;
  font-size: 16px;
}

.header-stats {
  color: var(--muted);
  font-size: 14px;
  text-align: right;
}

.app-shell {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 20px 32px;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  padding: 22px;
}

.hidden {
  display: none !important;
}

.section-head,
.quiz-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.mode-switch {
  display: inline-flex;
  padding: 4px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f9fafb;
}

.mode-button,
.ghost-button,
.primary-button,
.entry-button,
.filter-button {
  min-height: 44px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  padding: 10px 14px;
  font-weight: 700;
}

.mode-button {
  min-width: 72px;
  border-color: transparent;
  background: transparent;
}

.mode-button.active,
.primary-button,
.entry-button.primary,
.filter-button:hover {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
}

.primary-button:hover,
.entry-button.primary:hover {
  background: var(--primary-dark);
}

.ghost-button:hover,
.entry-button:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.entry-button.danger {
  color: var(--danger);
}

.entry-button.danger:hover {
  border-color: var(--danger);
  background: var(--danger-soft);
}

.quick-grid,
.button-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.button-grid.three {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.entry-button,
.filter-button {
  min-height: 58px;
  text-align: center;
}

.control-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin: 20px 0;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fafbfc;
}

.control-row input[type="number"] {
  width: 92px;
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 10px;
}

.check-line {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 40px;
  color: var(--muted);
}

.filter-block + .filter-block {
  margin-top: 22px;
}

.quiz-progress {
  color: var(--muted);
  font-weight: 700;
}

.progress-bar {
  height: 8px;
  overflow: hidden;
  border-radius: 999px;
  background: #e7ebf1;
  margin-bottom: 18px;
}

.progress-bar span {
  display: block;
  height: 100%;
  width: 0;
  background: var(--accent);
  transition: width 160ms ease;
}

.question-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 20px;
  background: #fff;
}

.question-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}

.tag {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  border-radius: 999px;
  background: #eef2f7;
  color: #384150;
  padding: 2px 10px;
  font-size: 13px;
  font-weight: 700;
}

.question-title {
  margin-bottom: 18px;
  font-size: 20px;
  font-weight: 800;
  line-height: 1.55;
}

.option-list {
  display: grid;
  gap: 10px;
}

.option-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  min-height: 48px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #fff;
}

.option-item input {
  margin-top: 5px;
}

.option-key {
  font-weight: 800;
  min-width: 24px;
}

.option-item.correct {
  border-color: #7abf93;
  background: var(--ok-soft);
}

.option-item.wrong {
  border-color: #d78077;
  background: var(--danger-soft);
}

.feedback {
  margin-top: 18px;
  border-radius: 8px;
  padding: 14px;
  background: var(--warn-soft);
  border: 1px solid #f0d797;
}

.feedback.good {
  background: var(--ok-soft);
  border-color: #91caa4;
}

.feedback.bad {
  background: var(--danger-soft);
  border-color: #dfaaa5;
}

.answer-line {
  margin: 0;
  font-weight: 800;
}

.explanation {
  margin: 8px 0 0;
  color: var(--muted);
}

.action-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 18px;
}

.action-row button {
  min-width: 110px;
}

.result-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.result-item {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;
  background: #fafbfc;
}

.result-value {
  display: block;
  font-size: 26px;
  font-weight: 900;
  line-height: 1.1;
}

.result-label {
  color: var(--muted);
  font-size: 14px;
}

.wrong-list {
  display: grid;
  gap: 12px;
}

.wrong-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
  background: #fff;
}

.wrong-card h3 {
  margin-bottom: 8px;
}

.muted {
  color: var(--muted);
}

@media (max-width: 760px) {
  .app-header {
    align-items: flex-start;
    flex-direction: column;
    padding-top: 20px;
  }

  .header-stats {
    text-align: left;
  }

  h1 {
    font-size: 25px;
  }

  .panel {
    padding: 16px;
  }

  .section-head,
  .quiz-top,
  .action-row {
    align-items: stretch;
    flex-direction: column;
  }

  .quick-grid,
  .button-grid,
  .button-grid.three,
  .result-grid {
    grid-template-columns: 1fr;
  }

  .mode-switch {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .control-row {
    align-items: stretch;
    flex-direction: column;
  }

  .control-row input[type="number"] {
    width: 100%;
  }

  .question-title {
    font-size: 18px;
  }

  .action-row button {
    width: 100%;
  }
}

</style>

<style>
body.is-locked .app-header,
body.is-locked .app-shell {
  display: none;
}

.secure-gate {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
}

.secure-gate__panel {
  width: min(420px, 100%);
  background: var(--panel, #fff);
  border: 1px solid var(--line, #d9dee7);
  border-radius: 8px;
  box-shadow: var(--shadow, 0 16px 42px rgba(27, 31, 36, 0.08));
  padding: 24px;
}

.secure-gate__panel h1 {
  margin: 0 0 16px;
  font-size: 24px;
}

.secure-gate__form {
  display: grid;
  gap: 12px;
}

.secure-gate__form label {
  color: var(--muted, #68707d);
  font-weight: 700;
}

.secure-gate__form input {
  width: 100%;
  border: 1px solid var(--line, #d9dee7);
  border-radius: 8px;
  padding: 10px 12px;
}

.secure-gate__form button {
  border: 0;
  border-radius: 8px;
  padding: 11px 14px;
  background: var(--primary, #2367c5);
  color: #fff;
  font-weight: 700;
}

.secure-gate__error {
  min-height: 24px;
  margin: 0;
  color: var(--danger, #ba3b35);
  font-weight: 700;
}
</style>
</head>
<body class="is-locked">
  <section class="secure-gate" id="secureGate" aria-labelledby="secureGateTitle">
    <div class="secure-gate__panel">
      <h1 id="secureGateTitle">&#35831;&#36755;&#20837;&#21475;&#20196;</h1>
      <form class="secure-gate__form" id="secureGateForm">
        <label for="securePass">&#21475;&#20196;</label>
        <input id="securePass" name="securePass" type="password" autocomplete="current-password" required>
        <button type="submit" id="secureSubmit">&#36827;&#20837;</button>
        <p class="secure-gate__error" id="secureError" role="alert" aria-live="polite"></p>
      </form>
    </div>
  </section>
  <header class="app-header">
    <div>
      <p class="eyebrow">刷题练习</p>
      <h1>刷题练习</h1>
    </div>
    <div class="header-stats" id="headerStats"></div>
  </header>

  <main class="app-shell">
    <section class="panel" id="homeView">
      <div class="section-head">
        <h2>开始练习</h2>
      </div>

      <div class="quick-grid">
        <button class="entry-button primary" type="button" data-action="all">全部练习</button>
        <button class="entry-button" type="button" data-action="wrong">只练错题</button>
        <button class="entry-button" type="button" data-action="random">随机练习</button>
        <button class="entry-button danger" type="button" data-action="clearWrong">清空错题</button>
      </div>

      <div class="control-row">
        <label for="randomCount">随机抽题数</label>
        <input id="randomCount" type="number" min="1" value="30">
        <label class="check-line">
          <input id="shuffleQuestions" type="checkbox" checked>
          打乱题目
        </label>
        <label class="check-line">
          <input id="shuffleOptions" type="checkbox" checked>
          打乱选项
        </label>
      </div>

      <div class="filter-block">
        <h3>按单元练习</h3>
        <div class="button-grid" id="unitButtons"></div>
      </div>

      <div class="filter-block">
        <h3>按题型练习</h3>
        <div class="button-grid three" id="typeButtons"></div>
      </div>
    </section>

    <section class="panel hidden" id="quizView">
      <div class="quiz-top">
        <button class="ghost-button" type="button" id="backHome">返回首页</button>
        <div class="quiz-progress" id="quizProgress"></div>
      </div>
      <div class="progress-bar" aria-hidden="true">
        <span id="progressFill"></span>
      </div>

      <article class="question-card" id="questionCard"></article>

      <div class="action-row">
        <button class="ghost-button" type="button" id="prevQuestion">上一题</button>
        <button class="primary-button" type="button" id="submitAnswer">提交</button>
        <button class="primary-button hidden" type="button" id="nextQuestion">下一题</button>
      </div>
    </section>

    <section class="panel hidden" id="resultView">
      <div class="section-head">
        <h2>本轮结果</h2>
        <button class="ghost-button" type="button" id="resultHome">返回首页</button>
      </div>
      <div class="result-grid" id="resultStats"></div>
      <div class="wrong-list" id="wrongList"></div>
    </section>
  </main>

  const appCode = "(function () {\n  \"use strict\";\n\n  const DEFAULT_META = { subject: \"刷题练习\", description: \"刷题练习\" };\n  const rawMeta = window.QUIZ_META \u0026\u0026 typeof window.QUIZ_META === \"object\" ? window.QUIZ_META : {};\n  const QUIZ_META = {\n    subject: String(rawMeta.subject || DEFAULT_META.subject),\n    description: String(rawMeta.description || DEFAULT_META.description),\n  };\n  const QUESTIONS = Array.isArray(window.QUESTIONS) ? window.QUESTIONS : [];\n  const TYPE_NAMES = {\n    single: \"单选\",\n    multiple: \"多选\",\n    judge: \"判断\",\n  };\n  const WRONG_KEY = `quizWrongIds:${QUIZ_META.subject}:v1`;\n\n  const homeView = document.getElementById(\"homeView\");\n  const quizView = document.getElementById(\"quizView\");\n  const resultView = document.getElementById(\"resultView\");\n  const headerStats = document.getElementById(\"headerStats\");\n  const unitButtons = document.getElementById(\"unitButtons\");\n  const typeButtons = document.getElementById(\"typeButtons\");\n  const randomCount = document.getElementById(\"randomCount\");\n  const shuffleQuestions = document.getElementById(\"shuffleQuestions\");\n  const shuffleOptions = document.getElementById(\"shuffleOptions\");\n  const questionCard = document.getElementById(\"questionCard\");\n  const quizProgress = document.getElementById(\"quizProgress\");\n  const progressFill = document.getElementById(\"progressFill\");\n  const submitAnswer = document.getElementById(\"submitAnswer\");\n  const nextQuestion = document.getElementById(\"nextQuestion\");\n  const prevQuestion = document.getElementById(\"prevQuestion\");\n  const resultStats = document.getElementById(\"resultStats\");\n  const wrongList = document.getElementById(\"wrongList\");\n\n  const state = {\n    queue: [],\n    index: 0,\n    answers: new Map(),\n    results: new Map(),\n    currentWrongIds: new Set(),\n  };\n\n  function applyMeta() {\n    document.title = QUIZ_META.subject;\n    const title = document.querySelector(\".app-header h1\");\n    const subtitle = document.querySelector(\".app-header .eyebrow\");\n    if (title) title.textContent = QUIZ_META.subject;\n    if (subtitle) subtitle.textContent = QUIZ_META.description;\n    randomCount.max = String(Math.max(1, QUESTIONS.length));\n    if (Number(randomCount.value) \u003e QUESTIONS.length \u0026\u0026 QUESTIONS.length \u003e 0) {\n      randomCount.value = String(QUESTIONS.length);\n    }\n  }\n\n  function readWrongIds() {\n    try {\n      const parsed = JSON.parse(localStorage.getItem(WRONG_KEY) || \"[]\");\n      return new Set(Array.isArray(parsed) ? parsed : []);\n    } catch (error) {\n      return new Set();\n    }\n  }\n\n  function writeWrongIds(ids) {\n    try {\n      localStorage.setItem(WRONG_KEY, JSON.stringify(Array.from(ids)));\n    } catch (error) {\n      // iOS file:// 下 localStorage 可能不可用，忽略以保证答题不中断\n    }\n  }\n\n  function shuffle(items) {\n    const copy = items.slice();\n    for (let i = copy.length - 1; i \u003e 0; i--) {\n      const j = Math.floor(Math.random() * (i + 1));\n      [copy[i], copy[j]] = [copy[j], copy[i]];\n    }\n    return copy;\n  }\n\n  function optionText(q, key) {\n    const option = q.options.find((item) =\u003e item.key === key);\n    return option ? `${key}. ${option.text}` : key;\n  }\n\n  function answerText(q) {\n    return q.answer.map((key) =\u003e optionText(q, key)).join(\"；\");\n  }\n\n  function normalize(keys) {\n    return keys.slice().sort().join(\"|\");\n  }\n\n  function isCorrect(q, selected) {\n    return normalize(selected) === normalize(q.answer);\n  }\n\n  function getSelectedKeys() {\n    return Array.from(questionCard.querySelectorAll(\"input[name='answer']:checked\")).map((input) =\u003e input.value);\n  }\n\n  function setView(view) {\n    homeView.classList.toggle(\"hidden\", view !== \"home\");\n    quizView.classList.toggle(\"hidden\", view !== \"quiz\");\n    resultView.classList.toggle(\"hidden\", view !== \"result\");\n  }\n\n  function updateHeader() {\n    const total = QUESTIONS.length;\n    const single = QUESTIONS.filter((q) =\u003e q.type === \"single\").length;\n    const multiple = QUESTIONS.filter((q) =\u003e q.type === \"multiple\").length;\n    const judge = QUESTIONS.filter((q) =\u003e q.type === \"judge\").length;\n    const wrong = readWrongIds().size;\n    headerStats.textContent = `共${total}题 · 单选${single} · 多选${multiple} · 判断${judge} · 错题${wrong}`;\n  }\n\n  function buildHome() {\n    const units = Array.from(new Set(QUESTIONS.map((q) =\u003e q.unit)));\n    unitButtons.innerHTML = units.map((unit) =\u003e (\n      `\u003cbutton class=\"filter-button\" type=\"button\" data-unit=\"${escapeAttr(unit)}\"\u003e${escapeHtml(unit)}\u003c/button\u003e`\n    )).join(\"\");\n\n    typeButtons.innerHTML = Object.entries(TYPE_NAMES).map(([type, name]) =\u003e (\n      `\u003cbutton class=\"filter-button\" type=\"button\" data-type=\"${type}\"\u003e${name}\u003c/button\u003e`\n    )).join(\"\");\n  }\n\n  function startSession(config) {\n    const wrongIds = readWrongIds();\n    let pool = QUESTIONS.slice();\n\n    if (config.unit) pool = pool.filter((q) =\u003e q.unit === config.unit);\n    if (config.type) pool = pool.filter((q) =\u003e q.type === config.type);\n    if (config.wrongOnly) pool = pool.filter((q) =\u003e wrongIds.has(q.id));\n\n    if (pool.length === 0) {\n      alert(\"当前条件下没有题目。\");\n      return;\n    }\n\n    if (config.random) {\n      const count = Math.max(1, Math.min(Number(randomCount.value) || 30, pool.length));\n      pool = sampleByUnit(pool, count);\n    }\n    const queue = shuffleQuestions.checked ? shuffle(pool) : pool.slice();\n\n    state.queue = queue.map((q) =\u003e ({\n      question: q,\n      options: shouldShuffleOptions(q) ? shuffle(q.options) : q.options.slice(),\n    }));\n    state.index = 0;\n    state.answers = new Map();\n    state.results = new Map();\n    state.currentWrongIds = new Set();\n\n    setView(\"quiz\");\n    renderQuestion();\n  }\n\n  // 把 count 个名额在若干分桶间均摊：基础均分 + 余数随机分配 + 某桶不足时把缺额补给其他还有余量的桶。\n  // buckets: [{ items: 已打乱的候选数组, selected: [] }]，原地修改并返回实际抽出的项目数组。\n  function distributeQuota(buckets, count) {\n    if (buckets.length === 0) return [];\n    const baseQuota = Math.floor(count / buckets.length);\n    const extra = new Set(shuffle(buckets).slice(0, count % buckets.length));\n    let deficit = 0;\n\n    for (const bucket of buckets) {\n      const quota = baseQuota + (extra.has(bucket) ? 1 : 0);\n      const picked = bucket.items.splice(0, quota);\n      bucket.selected.push(...picked);\n      deficit += quota - picked.length;\n    }\n\n    while (deficit \u003e 0) {\n      const available = buckets.filter((bucket) =\u003e bucket.items.length \u003e 0);\n      if (available.length === 0) break;\n      for (const bucket of shuffle(available)) {\n        if (deficit === 0) break;\n        bucket.selected.push(bucket.items.shift());\n        deficit--;\n      }\n    }\n\n    return buckets.flatMap((bucket) =\u003e bucket.selected);\n  }\n\n  // 双层均摊：先在各单元间均摊名额，再在每个单元内部按题型(单选/多选/判断)均摊。\n  function sampleByUnit(pool, count) {\n    const units = Array.from(new Set(pool.map((q) =\u003e q.unit)));\n    const unitBuckets = units.map((unit) =\u003e ({\n      unit,\n      items: shuffle(pool.filter((q) =\u003e q.unit === unit)),\n      selected: [],\n    }));\n    // 第一层：决定每个单元抽多少题\n    distributeQuota(unitBuckets, count);\n    const unitQuota = unitBuckets.map((b) =\u003e b.selected.length);\n\n    // 第二层：对每个单元，按题型均摊抽取该单元应得的题数\n    const result = [];\n    unitBuckets.forEach((bucket, i) =\u003e {\n      const quota = unitQuota[i];\n      const byType = [\"single\", \"multiple\", \"judge\"].map((type) =\u003e ({\n        type,\n        items: shuffle(pool.filter((q) =\u003e q.unit === bucket.unit \u0026\u0026 q.type === type)),\n        selected: [],\n      })).filter((b) =\u003e b.items.length \u003e 0);\n      result.push(...distributeQuota(byType, quota));\n    });\n\n    return result;\n  }\n\n  function shouldShuffleOptions(q) {\n    if (q.type === \"judge\") return false;\n    return Boolean(shuffleOptions.checked);\n  }\n\n  function renderQuestion() {\n    const item = state.queue[state.index];\n    const q = item.question;\n    const saved = state.answers.get(q.id) || [];\n    const result = state.results.get(q.id) || null;\n    const disabled = Boolean(result);\n    const inputType = q.type === \"multiple\" ? \"checkbox\" : \"radio\";\n\n    quizProgress.textContent = `${state.index + 1} / ${state.queue.length}`;\n    progressFill.style.width = `${((state.index + 1) / state.queue.length) * 100}%`;\n    prevQuestion.disabled = state.index === 0;\n    submitAnswer.classList.toggle(\"hidden\", Boolean(result));\n    nextQuestion.classList.toggle(\"hidden\", !result);\n    nextQuestion.textContent = state.index === state.queue.length - 1 ? \"查看结果\" : \"下一题\";\n\n    questionCard.innerHTML = `\n      \u003cdiv class=\"question-meta\"\u003e\n        \u003cspan class=\"tag\"\u003e${escapeHtml(q.unit)}\u003c/span\u003e\n        \u003cspan class=\"tag\"\u003e${TYPE_NAMES[q.type]}\u003c/span\u003e\n        ${q.knowledgePoint ? `\u003cspan class=\"tag\"\u003e${escapeHtml(q.knowledgePoint)}\u003c/span\u003e` : \"\"}\n      \u003c/div\u003e\n      \u003cdiv class=\"question-title\"\u003e${escapeHtml(q.question)}\u003c/div\u003e\n      \u003cdiv class=\"option-list\"\u003e\n        ${item.options.map((option) =\u003e renderOption(q, option, inputType, saved, disabled, result)).join(\"\")}\n      \u003c/div\u003e\n      ${result ? renderFeedback(q, result.correct) : \"\"}\n    `;\n  }\n\n  function renderOption(q, option, inputType, saved, disabled, result) {\n    const checked = saved.includes(option.key) ? \"checked\" : \"\";\n    const locked = disabled ? \"disabled\" : \"\";\n    let className = \"option-item\";\n    if (result \u0026\u0026 q.answer.includes(option.key)) className += \" correct\";\n    if (result \u0026\u0026 !result.correct \u0026\u0026 result.selected.includes(option.key) \u0026\u0026 !q.answer.includes(option.key)) className += \" wrong\";\n\n    return `\n      \u003clabel class=\"${className}\"\u003e\n        \u003cinput type=\"${inputType}\" name=\"answer\" value=\"${option.key}\" ${checked} ${locked}\u003e\n        \u003cspan class=\"option-key\"\u003e${option.key}\u003c/span\u003e\n        \u003cspan\u003e${escapeHtml(option.text)}\u003c/span\u003e\n      \u003c/label\u003e\n    `;\n  }\n\n  function renderFeedback(q, correct) {\n    const statusClass = correct ? \"good\" : \"bad\";\n    const statusText = correct ? \"回答正确\" : \"回答错误\";\n    return `\n      \u003cdiv class=\"feedback ${statusClass}\"\u003e\n        \u003cp class=\"answer-line\"\u003e${statusText} · 正确答案：${escapeHtml(answerText(q))}\u003c/p\u003e\n        ${q.explanation ? `\u003cp class=\"explanation\"\u003e${escapeHtml(q.explanation)}\u003c/p\u003e` : \"\"}\n      \u003c/div\u003e\n    `;\n  }\n\n  function submitCurrent() {\n    const item = state.queue[state.index];\n    const q = item.question;\n    const selected = getSelectedKeys();\n    if (selected.length === 0) {\n      alert(\"请先选择答案。\");\n      return;\n    }\n\n    state.answers.set(q.id, selected);\n    const correct = isCorrect(q, selected);\n\n    if (!correct) {\n      state.currentWrongIds.add(q.id);\n      const wrongIds = readWrongIds();\n      wrongIds.add(q.id);\n      writeWrongIds(wrongIds);\n      updateHeader();\n    }\n\n    state.results.set(q.id, { correct, selected });\n    renderQuestion();\n  }\n\n  function goNext() {\n    if (state.index \u003c state.queue.length - 1) {\n      state.index++;\n      renderQuestion();\n    } else {\n      renderResult();\n    }\n  }\n\n  function goPrev() {\n    if (state.index === 0) return;\n    state.index--;\n    renderQuestion();\n  }\n\n  function renderResult() {\n    let correct = 0;\n    const wrongItems = [];\n\n    for (const item of state.queue) {\n      const q = item.question;\n      const selected = state.answers.get(q.id) || [];\n      if (isCorrect(q, selected)) {\n        correct++;\n      } else {\n        wrongItems.push({ q, selected });\n        state.currentWrongIds.add(q.id);\n      }\n    }\n\n    const wrongIds = readWrongIds();\n    for (const item of wrongItems) wrongIds.add(item.q.id);\n    writeWrongIds(wrongIds);\n    updateHeader();\n\n    const total = state.queue.length;\n    const wrong = total - correct;\n    const rate = total ? Math.round((correct / total) * 100) : 0;\n    resultStats.innerHTML = [\n      [\"总题数\", total],\n      [\"正确数\", correct],\n      [\"错误数\", wrong],\n      [\"正确率\", `${rate}%`],\n    ].map(([label, value]) =\u003e `\n      \u003cdiv class=\"result-item\"\u003e\n        \u003cspan class=\"result-value\"\u003e${value}\u003c/span\u003e\n        \u003cspan class=\"result-label\"\u003e${label}\u003c/span\u003e\n      \u003c/div\u003e\n    `).join(\"\");\n\n    wrongList.innerHTML = wrongItems.length ? wrongItems.map(({ q, selected }, index) =\u003e `\n      \u003carticle class=\"wrong-card\"\u003e\n        \u003ch3\u003e${index + 1}. ${escapeHtml(q.question)}\u003c/h3\u003e\n        \u003cp class=\"muted\"\u003e${escapeHtml(q.unit)} · ${TYPE_NAMES[q.type]}${q.knowledgePoint ? ` · ${escapeHtml(q.knowledgePoint)}` : \"\"}\u003c/p\u003e\n        \u003cp\u003e你的答案：${selected.length ? escapeHtml(selected.map((key) =\u003e optionText(q, key)).join(\"；\")) : \"未作答\"}\u003c/p\u003e\n        \u003cp\u003e正确答案：${escapeHtml(answerText(q))}\u003c/p\u003e\n        ${q.explanation ? `\u003cp class=\"muted\"\u003e${escapeHtml(q.explanation)}\u003c/p\u003e` : \"\"}\n      \u003c/article\u003e\n    `).join(\"\") : `\u003cp class=\"muted\"\u003e本轮没有错题。\u003c/p\u003e`;\n\n    setView(\"result\");\n  }\n\n  function clearWrong() {\n    if (!confirm(\"确认清空本地错题记录？\")) return;\n    writeWrongIds(new Set());\n    updateHeader();\n  }\n\n  function escapeHtml(value) {\n    return String(value)\n      .replace(/\u0026/g, \"\u0026amp;\")\n      .replace(/\u003c/g, \"\u0026lt;\")\n      .replace(/\u003e/g, \"\u0026gt;\")\n      .replace(/\"/g, \"\u0026quot;\")\n      .replace(/'/g, \"\u0026#39;\");\n  }\n\n  function escapeAttr(value) {\n    return escapeHtml(value);\n  }\n\n  document.querySelector(\"[data-action='all']\").addEventListener(\"click\", () =\u003e startSession({}));\n  document.querySelector(\"[data-action='wrong']\").addEventListener(\"click\", () =\u003e startSession({ wrongOnly: true }));\n  document.querySelector(\"[data-action='random']\").addEventListener(\"click\", () =\u003e startSession({ random: true }));\n  document.querySelector(\"[data-action='clearWrong']\").addEventListener(\"click\", clearWrong);\n\n  unitButtons.addEventListener(\"click\", (event) =\u003e {\n    const button = event.target.closest(\"[data-unit]\");\n    if (!button) return;\n    startSession({ unit: button.dataset.unit });\n  });\n\n  typeButtons.addEventListener(\"click\", (event) =\u003e {\n    const button = event.target.closest(\"[data-type]\");\n    if (!button) return;\n    startSession({ type: button.dataset.type });\n  });\n\n  submitAnswer.addEventListener(\"click\", submitCurrent);\n  nextQuestion.addEventListener(\"click\", goNext);\n  prevQuestion.addEventListener(\"click\", goPrev);\n  document.getElementById(\"backHome\").addEventListener(\"click\", () =\u003e setView(\"home\"));\n  document.getElementById(\"resultHome\").addEventListener(\"click\", () =\u003e setView(\"home\"));\n\n  applyMeta();\n  buildHome();\n  updateHeader();\n})();\n";
  const gate = document.getElementById("secureGate");
  const form = document.getElementById("secureGateForm");
  const input = document.getElementById("securePass");
  const errorBox = document.getElementById("secureError");
  const submit = document.getElementById("secureSubmit");
  const textEncoder = new TextEncoder();
  const textDecoder = new TextDecoder();

  function fromBase64(value) {
    const binary = atob(value);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i += 1) {
      bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
  }

  async function deriveKey(passphrase, salt, iterations) {
    const keyMaterial = await crypto.subtle.importKey(
      "raw",
      textEncoder.encode(passphrase),
      "PBKDF2",
      false,
      ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
      keyMaterial,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
  }

  async function decrypt(passphrase) {
    const enc = window.__ENC;
    const salt = fromBase64(enc.salt);
    const iv = fromBase64(enc.iv);
    const data = fromBase64(enc.data);
    const key = await deriveKey(passphrase, salt, enc.iter);
    const plaintext = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
    return JSON.parse(textDecoder.decode(plaintext));
  }

  function runApp(payload) {
    window.QUIZ_META = payload.meta || {};
    window.QUESTIONS = Array.isArray(payload.questions) ? payload.questions : [];
    document.body.classList.remove("is-locked");
    if (gate) gate.remove();
    const script = document.createElement("script");
    script.text = appCode;
    document.body.appendChild(script);
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    errorBox.textContent = "";
    submit.disabled = true;
    try {
      const payload = await decrypt(input.value);
      runApp(payload);
      input.value = "";
    } catch (error) {
      errorBox.textContent = "\u53e3\u4ee4\u9519\u8bef";
      submit.disabled = false;
      input.select();
    }
  });

  input.focus();
})();
</script>
