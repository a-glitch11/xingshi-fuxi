<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>刷题练习</title>
  <style>
:root {
  color-scheme: light;
  --bg: #f6f7f9;
  --panel: #ffffff;
  --text: #1b1f24;
  --muted: #68707d;
  --line: #d9dee7;
  --primary: #2367c5;
  --primary-dark: #174f9e;
  --accent: #0b7f6b;
  --danger: #ba3b35;
  --danger-soft: #fff1ef;
  --ok-soft: #edf8f2;
  --warn-soft: #fff6df;
  --shadow: 0 16px 42px rgba(27, 31, 36, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  line-height: 1.6;
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  max-width: 1120px;
  margin: 0 auto;
  padding: 28px 20px 18px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--accent);
  font-size: 14px;
  font-weight: 700;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: 30px;
  line-height: 1.2;
}

h2 {
  margin-bottom: 0;
  font-size: 22px;
}

h3 {
  margin-bottom: 12px;
  font-size: 16px;
}

.header-stats {
  color: var(--muted);
  font-size: 14px;
  text-align: right;
}

.app-shell {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 20px 32px;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  padding: 22px;
}

.hidden {
  display: none !important;
}

.section-head,
.quiz-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.mode-switch {
  display: inline-flex;
  padding: 4px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f9fafb;
}

.mode-button,
.ghost-button,
.primary-button,
.entry-button,
.filter-button {
  min-height: 44px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  padding: 10px 14px;
  font-weight: 700;
}

.mode-button {
  min-width: 72px;
  border-color: transparent;
  background: transparent;
}

.mode-button.active,
.primary-button,
.entry-button.primary,
.filter-button:hover {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
}

.primary-button:hover,
.entry-button.primary:hover {
  background: var(--primary-dark);
}

.ghost-button:hover,
.entry-button:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.entry-button.danger {
  color: var(--danger);
}

.entry-button.danger:hover {
  border-color: var(--danger);
  background: var(--danger-soft);
}

.quick-grid,
.button-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.button-grid.three {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.entry-button,
.filter-button {
  min-height: 58px;
  text-align: center;
}

.control-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin: 20px 0;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fafbfc;
}

.control-row input[type="number"] {
  width: 92px;
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 10px;
}

.check-line {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 40px;
  color: var(--muted);
}

.filter-block + .filter-block {
  margin-top: 22px;
}

.quiz-progress {
  color: var(--muted);
  font-weight: 700;
}

.progress-bar {
  height: 8px;
  overflow: hidden;
  border-radius: 999px;
  background: #e7ebf1;
  margin-bottom: 18px;
}

.progress-bar span {
  display: block;
  height: 100%;
  width: 0;
  background: var(--accent);
  transition: width 160ms ease;
}

.question-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 20px;
  background: #fff;
}

.question-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}

.tag {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  border-radius: 999px;
  background: #eef2f7;
  color: #384150;
  padding: 2px 10px;
  font-size: 13px;
  font-weight: 700;
}

.question-title {
  margin-bottom: 18px;
  font-size: 20px;
  font-weight: 800;
  line-height: 1.55;
}

.option-list {
  display: grid;
  gap: 10px;
}

.option-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  min-height: 48px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #fff;
}

.option-item input {
  margin-top: 5px;
}

.option-key {
  font-weight: 800;
  min-width: 24px;
}

.option-item.correct {
  border-color: #7abf93;
  background: var(--ok-soft);
}

.option-item.wrong {
  border-color: #d78077;
  background: var(--danger-soft);
}

.feedback {
  margin-top: 18px;
  border-radius: 8px;
  padding: 14px;
  background: var(--warn-soft);
  border: 1px solid #f0d797;
}

.feedback.good {
  background: var(--ok-soft);
  border-color: #91caa4;
}

.feedback.bad {
  background: var(--danger-soft);
  border-color: #dfaaa5;
}

.answer-line {
  margin: 0;
  font-weight: 800;
}

.explanation {
  margin: 8px 0 0;
  color: var(--muted);
}

.action-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 18px;
}

.action-row button {
  min-width: 110px;
}

.result-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.result-item {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;
  background: #fafbfc;
}

.result-value {
  display: block;
  font-size: 26px;
  font-weight: 900;
  line-height: 1.1;
}

.result-label {
  color: var(--muted);
  font-size: 14px;
}

.wrong-list {
  display: grid;
  gap: 12px;
}

.wrong-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
  background: #fff;
}

.wrong-card h3 {
  margin-bottom: 8px;
}

.muted {
  color: var(--muted);
}

@media (max-width: 760px) {
  .app-header {
    align-items: flex-start;
    flex-direction: column;
    padding-top: 20px;
  }

  .header-stats {
    text-align: left;
  }

  h1 {
    font-size: 25px;
  }

  .panel {
    padding: 16px;
  }

  .section-head,
  .quiz-top,
  .action-row {
    align-items: stretch;
    flex-direction: column;
  }

  .quick-grid,
  .button-grid,
  .button-grid.three,
  .result-grid {
    grid-template-columns: 1fr;
  }

  .mode-switch {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .control-row {
    align-items: stretch;
    flex-direction: column;
  }

  .control-row input[type="number"] {
    width: 100%;
  }

  .question-title {
    font-size: 18px;
  }

  .action-row button {
    width: 100%;
  }
}

</style>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">刷题练习</p>
      <h1>刷题练习</h1>
    </div>
    <div class="header-stats" id="headerStats"></div>
  </header>

  <main class="app-shell">
    <section class="panel" id="homeView">
      <div class="section-head">
        <h2>开始练习</h2>
      </div>

      <div class="quick-grid">
        <button class="entry-button primary" type="button" data-action="all">全部练习</button>
        <button class="entry-button" type="button" data-action="wrong">只练错题</button>
        <button class="entry-button" type="button" data-action="random">随机练习</button>
        <button class="entry-button danger" type="button" data-action="clearWrong">清空错题</button>
      </div>

      <div class="control-row">
        <label for="randomCount">随机抽题数</label>
        <input id="randomCount" type="number" min="1" value="30">
        <label class="check-line">
          <input id="shuffleQuestions" type="checkbox" checked>
          打乱题目
        </label>
        <label class="check-line">
          <input id="shuffleOptions" type="checkbox" checked>
          打乱选项
        </label>
      </div>

      <div class="filter-block">
        <h3>按单元练习</h3>
        <div class="button-grid" id="unitButtons"></div>
      </div>

      <div class="filter-block">
        <h3>按题型练习</h3>
        <div class="button-grid three" id="typeButtons"></div>
      </div>
    </section>

    <section class="panel hidden" id="quizView">
      <div class="quiz-top">
        <button class="ghost-button" type="button" id="backHome">返回首页</button>
        <div class="quiz-progress" id="quizProgress"></div>
      </div>
      <div class="progress-bar" aria-hidden="true">
        <span id="progressFill"></span>
      </div>

      <article class="question-card" id="questionCard"></article>

      <div class="action-row">
        <button class="ghost-button" type="button" id="prevQuestion">上一题</button>
        <button class="primary-button" type="button" id="submitAnswer">提交</button>
        <button class="primary-button hidden" type="button" id="nextQuestion">下一题</button>
      </div>
    </section>

    <section class="panel hidden" id="resultView">
      <div class="section-head">
        <h2>本轮结果</h2>
        <button class="ghost-button" type="button" id="resultHome">返回首页</button>
      </div>
      <div class="result-grid" id="resultStats"></div>
      <div class="wrong-list" id="wrongList"></div>
    </section>
  </main>

  <script>
(function () {
  "use strict";

  const DEFAULT_META = { subject: "刷题练习", description: "刷题练习" };
  const rawMeta = window.QUIZ_META && typeof window.QUIZ_META === "object" ? window.QUIZ_META : {};
  const QUIZ_META = {
    subject: String(rawMeta.subject || DEFAULT_META.subject),
    description: String(rawMeta.description || DEFAULT_META.description),
  };
  const QUESTIONS = Array.isArray(window.QUESTIONS) ? window.QUESTIONS : [];
  const TYPE_NAMES = {
    single: "单选",
    multiple: "多选",
    judge: "判断",
  };
  const WRONG_KEY = `quizWrongIds:${QUIZ_META.subject}:v1`;

  const homeView = document.getElementById("homeView");
  const quizView = document.getElementById("quizView");
  const resultView = document.getElementById("resultView");
  const headerStats = document.getElementById("headerStats");
  const unitButtons = document.getElementById("unitButtons");
  const typeButtons = document.getElementById("typeButtons");
  const randomCount = document.getElementById("randomCount");
  const shuffleQuestions = document.getElementById("shuffleQuestions");
  const shuffleOptions = document.getElementById("shuffleOptions");
  const questionCard = document.getElementById("questionCard");
  const quizProgress = document.getElementById("quizProgress");
  const progressFill = document.getElementById("progressFill");
  const submitAnswer = document.getElementById("submitAnswer");
  const nextQuestion = document.getElementById("nextQuestion");
  const prevQuestion = document.getElementById("prevQuestion");
  const resultStats = document.getElementById("resultStats");
  const wrongList = document.getElementById("wrongList");

  const state = {
    queue: [],
    index: 0,
    answers: new Map(),
    results: new Map(),
    currentWrongIds: new Set(),
  };

  function applyMeta() {
    document.title = QUIZ_META.subject;
    const title = document.querySelector(".app-header h1");
    const subtitle = document.querySelector(".app-header .eyebrow");
    if (title) title.textContent = QUIZ_META.subject;
    if (subtitle) subtitle.textContent = QUIZ_META.description;
    randomCount.max = String(Math.max(1, QUESTIONS.length));
    if (Number(randomCount.value) > QUESTIONS.length && QUESTIONS.length > 0) {
      randomCount.value = String(QUESTIONS.length);
    }
  }

  function readWrongIds() {
    try {
      const parsed = JSON.parse(localStorage.getItem(WRONG_KEY) || "[]");
      return new Set(Array.isArray(parsed) ? parsed : []);
    } catch (error) {
      return new Set();
    }
  }

  function writeWrongIds(ids) {
    try {
      localStorage.setItem(WRONG_KEY, JSON.stringify(Array.from(ids)));
    } catch (error) {
      // iOS file:// 下 localStorage 可能不可用，忽略以保证答题不中断
    }
  }

  function shuffle(items) {
    const copy = items.slice();
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function optionText(q, key) {
    const option = q.options.find((item) => item.key === key);
    return option ? `${key}. ${option.text}` : key;
  }

  function answerText(q) {
    return q.answer.map((key) => optionText(q, key)).join("；");
  }

  function normalize(keys) {
    return keys.slice().sort().join("|");
  }

  function isCorrect(q, selected) {
    return normalize(selected) === normalize(q.answer);
  }

  function getSelectedKeys() {
    return Array.from(questionCard.querySelectorAll("input[name='answer']:checked")).map((input) => input.value);
  }

  function setView(view) {
    homeView.classList.toggle("hidden", view !== "home");
    quizView.classList.toggle("hidden", view !== "quiz");
    resultView.classList.toggle("hidden", view !== "result");
  }

  function updateHeader() {
    const total = QUESTIONS.length;
    const single = QUESTIONS.filter((q) => q.type === "single").length;
    const multiple = QUESTIONS.filter((q) => q.type === "multiple").length;
    const judge = QUESTIONS.filter((q) => q.type === "judge").length;
    const wrong = readWrongIds().size;
    headerStats.textContent = `共${total}题 · 单选${single} · 多选${multiple} · 判断${judge} · 错题${wrong}`;
  }

  function buildHome() {
    const units = Array.from(new Set(QUESTIONS.map((q) => q.unit)));
    unitButtons.innerHTML = units.map((unit) => (
      `<button class="filter-button" type="button" data-unit="${escapeAttr(unit)}">${escapeHtml(unit)}</button>`
    )).join("");

    typeButtons.innerHTML = Object.entries(TYPE_NAMES).map(([type, name]) => (
      `<button class="filter-button" type="button" data-type="${type}">${name}</button>`
    )).join("");
  }

  function startSession(config) {
    const wrongIds = readWrongIds();
    let pool = QUESTIONS.slice();

    if (config.unit) pool = pool.filter((q) => q.unit === config.unit);
    if (config.type) pool = pool.filter((q) => q.type === config.type);
    if (config.wrongOnly) pool = pool.filter((q) => wrongIds.has(q.id));

    if (pool.length === 0) {
      alert("当前条件下没有题目。");
      return;
    }

    if (config.random) {
      const count = Math.max(1, Math.min(Number(randomCount.value) || 30, pool.length));
      pool = sampleByUnit(pool, count);
    }
    const queue = shuffleQuestions.checked ? shuffle(pool) : pool.slice();

    state.queue = queue.map((q) => ({
      question: q,
      options: shouldShuffleOptions(q) ? shuffle(q.options) : q.options.slice(),
    }));
    state.index = 0;
    state.answers = new Map();
    state.results = new Map();
    state.currentWrongIds = new Set();

    setView("quiz");
    renderQuestion();
  }

  // 把 count 个名额在若干分桶间均摊：基础均分 + 余数随机分配 + 某桶不足时把缺额补给其他还有余量的桶。
  // buckets: [{ items: 已打乱的候选数组, selected: [] }]，原地修改并返回实际抽出的项目数组。
  function distributeQuota(buckets, count) {
    if (buckets.length === 0) return [];
    const baseQuota = Math.floor(count / buckets.length);
    const extra = new Set(shuffle(buckets).slice(0, count % buckets.length));
    let deficit = 0;

    for (const bucket of buckets) {
      const quota = baseQuota + (extra.has(bucket) ? 1 : 0);
      const picked = bucket.items.splice(0, quota);
      bucket.selected.push(...picked);
      deficit += quota - picked.length;
    }

    while (deficit > 0) {
      const available = buckets.filter((bucket) => bucket.items.length > 0);
      if (available.length === 0) break;
      for (const bucket of shuffle(available)) {
        if (deficit === 0) break;
        bucket.selected.push(bucket.items.shift());
        deficit--;
      }
    }

    return buckets.flatMap((bucket) => bucket.selected);
  }

  // 双层均摊：先在各单元间均摊名额，再在每个单元内部按题型(单选/多选/判断)均摊。
  function sampleByUnit(pool, count) {
    const units = Array.from(new Set(pool.map((q) => q.unit)));
    const unitBuckets = units.map((unit) => ({
      unit,
      items: shuffle(pool.filter((q) => q.unit === unit)),
      selected: [],
    }));
    // 第一层：决定每个单元抽多少题
    distributeQuota(unitBuckets, count);
    const unitQuota = unitBuckets.map((b) => b.selected.length);

    // 第二层：对每个单元，按题型均摊抽取该单元应得的题数
    const result = [];
    unitBuckets.forEach((bucket, i) => {
      const quota = unitQuota[i];
      const byType = ["single", "multiple", "judge"].map((type) => ({
        type,
        items: shuffle(pool.filter((q) => q.unit === bucket.unit && q.type === type)),
        selected: [],
      })).filter((b) => b.items.length > 0);
      result.push(...distributeQuota(byType, quota));
    });

    return result;
  }

  function shouldShuffleOptions(q) {
    if (q.type === "judge") return false;
    return Boolean(shuffleOptions.checked);
  }

  function renderQuestion() {
    const item = state.queue[state.index];
    const q = item.question;
    const saved = state.answers.get(q.id) || [];
    const result = state.results.get(q.id) || null;
    const disabled = Boolean(result);
    const inputType = q.type === "multiple" ? "checkbox" : "radio";

    quizProgress.textContent = `${state.index + 1} / ${state.queue.length}`;
    progressFill.style.width = `${((state.index + 1) / state.queue.length) * 100}%`;
    prevQuestion.disabled = state.index === 0;
    submitAnswer.classList.toggle("hidden", Boolean(result));
    nextQuestion.classList.toggle("hidden", !result);
    nextQuestion.textContent = state.index === state.queue.length - 1 ? "查看结果" : "下一题";

    questionCard.innerHTML = `
      <div class="question-meta">
        <span class="tag">${escapeHtml(q.unit)}</span>
        <span class="tag">${TYPE_NAMES[q.type]}</span>
        ${q.knowledgePoint ? `<span class="tag">${escapeHtml(q.knowledgePoint)}</span>` : ""}
      </div>
      <div class="question-title">${escapeHtml(q.question)}</div>
      <div class="option-list">
        ${item.options.map((option) => renderOption(q, option, inputType, saved, disabled, result)).join("")}
      </div>
      ${result ? renderFeedback(q, result.correct) : ""}
    `;
  }

  function renderOption(q, option, inputType, saved, disabled, result) {
    const checked = saved.includes(option.key) ? "checked" : "";
    const locked = disabled ? "disabled" : "";
    let className = "option-item";
    if (result && q.answer.includes(option.key)) className += " correct";
    if (result && !result.correct && result.selected.includes(option.key) && !q.answer.includes(option.key)) className += " wrong";

    return `
      <label class="${className}">
        <input type="${inputType}" name="answer" value="${option.key}" ${checked} ${locked}>
        <span class="option-key">${option.key}</span>
        <span>${escapeHtml(option.text)}</span>
      </label>
    `;
  }

  function renderFeedback(q, correct) {
    const statusClass = correct ? "good" : "bad";
    const statusText = correct ? "回答正确" : "回答错误";
    return `
      <div class="feedback ${statusClass}">
        <p class="answer-line">${statusText} · 正确答案：${escapeHtml(answerText(q))}</p>
        ${q.explanation ? `<p class="explanation">${escapeHtml(q.explanation)}</p>` : ""}
      </div>
    `;
  }

  function submitCurrent() {
    const item = state.queue[state.index];
    const q = item.question;
    const selected = getSelectedKeys();
    if (selected.length === 0) {
      alert("请先选择答案。");
      return;
    }

    state.answers.set(q.id, selected);
    const correct = isCorrect(q, selected);

    if (!correct) {
      state.currentWrongIds.add(q.id);
      const wrongIds = readWrongIds();
      wrongIds.add(q.id);
      writeWrongIds(wrongIds);
      updateHeader();
    }

    state.results.set(q.id, { correct, selected });
    renderQuestion();
  }

  function goNext() {
    if (state.index < state.queue.length - 1) {
      state.index++;
      renderQuestion();
    } else {
      renderResult();
    }
  }

  function goPrev() {
    if (state.index === 0) return;
    state.index--;
    renderQuestion();
  }

  function renderResult() {
    let correct = 0;
    const wrongItems = [];

    for (const item of state.queue) {
      const q = item.question;
      const selected = state.answers.get(q.id) || [];
      if (isCorrect(q, selected)) {
        correct++;
      } else {
        wrongItems.push({ q, selected });
        state.currentWrongIds.add(q.id);
      }
    }

    const wrongIds = readWrongIds();
    for (const item of wrongItems) wrongIds.add(item.q.id);
    writeWrongIds(wrongIds);
    updateHeader();

    const total = state.queue.length;
    const wrong = total - correct;
    const rate = total ? Math.round((correct / total) * 100) : 0;
    resultStats.innerHTML = [
      ["总题数", total],
      ["正确数", correct],
      ["错误数", wrong],
      ["正确率", `${rate}%`],
    ].map(([label, value]) => `
      <div class="result-item">
        <span class="result-value">${value}</span>
        <span class="result-label">${label}</span>
      </div>
    `).join("");

    wrongList.innerHTML = wrongItems.length ? wrongItems.map(({ q, selected }, index) => `
      <article class="wrong-card">
        <h3>${index + 1}. ${escapeHtml(q.question)}</h3>
        <p class="muted">${escapeHtml(q.unit)} · ${TYPE_NAMES[q.type]}${q.knowledgePoint ? ` · ${escapeHtml(q.knowledgePoint)}` : ""}</p>
        <p>你的答案：${selected.length ? escapeHtml(selected.map((key) => optionText(q, key)).join("；")) : "未作答"}</p>
        <p>正确答案：${escapeHtml(answerText(q))}</p>
        ${q.explanation ? `<p class="muted">${escapeHtml(q.explanation)}</p>` : ""}
      </article>
    `).join("") : `<p class="muted">本轮没有错题。</p>`;

    setView("result");
  }

  function clearWrong() {
    if (!confirm("确认清空本地错题记录？")) return;
    writeWrongIds(new Set());
    updateHeader();
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function escapeAttr(value) {
    return escapeHtml(value);
  }

  document.querySelector("[data-action='all']").addEventListener("click", () => startSession({}));
  document.querySelector("[data-action='wrong']").addEventListener("click", () => startSession({ wrongOnly: true }));
  document.querySelector("[data-action='random']").addEventListener("click", () => startSession({ random: true }));
  document.querySelector("[data-action='clearWrong']").addEventListener("click", clearWrong);

  unitButtons.addEventListener("click", (event) => {
    const button = event.target.closest("[data-unit]");
    if (!button) return;
    startSession({ unit: button.dataset.unit });
  });

  typeButtons.addEventListener("click", (event) => {
    const button = event.target.closest("[data-type]");
    if (!button) return;
    startSession({ type: button.dataset.type });
  });

  submitAnswer.addEventListener("click", submitCurrent);
  nextQuestion.addEventListener("click", goNext);
  prevQuestion.addEventListener("click", goPrev);
  document.getElementById("backHome").addEventListener("click", () => setView("home"));
  document.getElementById("resultHome").addEventListener("click", () => setView("home"));

  applyMeta();
  buildHome();
  updateHeader();
})();

</script>
</body>
</html>
